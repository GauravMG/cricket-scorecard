<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Cricket Scoreboard Overlay</title>

  <link rel="stylesheet" href="./style.css" />
</head>

<body>
  <div class="wrap">
    <div class="board">
      <div class="topbar">
        <div class="team home">
          <div class="badge" id="badgeA"></div>
          <div class="teaminfo">
            <div class="teamname" id="teamA"></div>
            <div class="scoreline">
              <div class="score" id="scoreA"></div>
              <div class="overs" id="oversA"></div>
            </div>
            <div class="subtitle" id="batA"></div>
          </div>
        </div>

        <div class="centerbox">
          <div class="matchtitle" id="matchTitle"></div>
          <div class="matchstate" id="matchState"></div>
          <div class="matchsub" id="matchSub"></div>
        </div>

        <div class="team away">
          <div class="badge" id="badgeB"></div>
          <div class="teaminfo">
            <div class="teamname" id="teamB"></div>
            <div class="scoreline">
              <div class="score" id="scoreB"></div>
              <div class="overs" id="oversB"></div>
            </div>
            <div class="subtitle" id="batB"></div>
          </div>
        </div>
      </div>

      <div class="infobar">
        <div class="chip"><span>Last Wkt</span> <b id="lastWicket"></b></div>
        <div class="chip"><span>Next Bat</span> <b id="nextBatsman"></b></div>
        <div class="chip"><span>Req Rate</span> <b id="reqRate"></b></div>
        <div class="chip"><span>Venue</span> <b id="venue"></b></div>
      </div>

      <div class="grid">
        <div class="card">
          <div class="cardhead">Batters</div>
          <div class="cardbody">
            <div class="playerrow">
              <div class="name" id="bat1Name"></div>
              <div class="stats" id="bat1Stat"></div>
            </div>
            <div class="playerrow">
              <div class="name" id="bat2Name"></div>
              <div class="stats" id="bat2Stat"></div>
            </div>
            <div class="mini" id="batNote"></div>
          </div>
        </div>

        <div class="card">
          <div class="cardhead">Bowling</div>
          <div class="cardbody">
            <div class="playerrow">
              <div class="name bowler" id="bowl1Name"></div>
              <div class="stats" id="bowl1Stat"></div>
            </div>
            <div class="playerrow">
              <div class="name bowler" id="bowl2Name"></div>
              <div class="stats" id="bowl2Stat"></div>
            </div>
            <div class="mini" id="bowlNote"></div>
          </div>
        </div>

        <div class="card">
          <div class="cardhead">Match Info</div>
          <div class="cardbody">
            <div class="playerrow">
              <div class="name">Innings</div>
              <div class="stats" id="inn1"></div>
            </div>
            <div class="playerrow">
              <div class="name">Format</div>
              <div class="stats" id="fmt"></div>
            </div>
            <div class="playerrow">
              <div class="name">Status</div>
              <div class="stats" id="status"></div>
            </div>
            <div class="playerrow">
              <div class="name">Over</div>
              <div class="stats" id="overInfo"></div>
            </div>
          </div>
        </div>
      </div>

      <div class="ticker" id="ticker">
        WICKET! Hashim Amla departs. New batter walks in.
      </div>
    </div>
  </div>

  <script src="./script.js"></script>
</body>

</html>
